specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LotryLaunch
    network: base
    source:
      address: "0x1D7d45Bb9D17b4915014d6dcd4C22DC17048DeD4"
      abi: LotryLaunch
      startBlock: 38469179
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenCreated
      abis:
        - name: LotryLaunch
          file: ./abis/LotryLaunch.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenCreated(indexed address,string,string)
          handler: handleTokenCreated
      file: ./src/lotry-launch.ts
