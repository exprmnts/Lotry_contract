specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TokenLaunchpad
    network: base
    source:
      address: "0xe60e8e66ef394080144711bda9a86de63b679888"
      abi: TokenLaunchpad
      startBlock: 34850982
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenCreated
      abis:
        - name: TokenLaunchpad
          file: ./abis/TokenLaunchpad.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenCreated(indexed address,string,string)
          handler: handleTokenCreated
      file: ./src/token-launchpad.ts
templates:
  - name: BondingCurvePool
    kind: ethereum/contract
    network: base
    source:
      abi: BondingCurvePool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/bonding-curve-pool.ts
      entities:
        - TradeEvent
      abis:
        - name: BondingCurvePool
          file: ./abis/BondingCurvePool.json
      eventHandlers:
        - event: TradeEvent(indexed address,uint256)
          handler: handleTradeEvent
