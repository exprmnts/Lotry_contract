specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LotryLaunch
    network: base-sepolia
    source:
      address: "0xFAf53333b061b5037E2C35A27950bF2C3B07e0a8"
      abi: LotryLaunch
      startBlock: 32769941
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenCreated
      abis:
        - name: LotryLaunch
          file: ./abis/LotryLaunch.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenCreated(indexed address,indexed address,indexed uint256,uint256,string,string)
          handler: handleTokenCreated
      file: ./src/lotry-launch.ts
