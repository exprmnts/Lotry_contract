specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LotryLaunch
    network: base
    source:
      address: "0x4404D6b60365bE8280758144aCdA71C08c5c301b"
      abi: LotryLaunch
      startBlock: 38077257
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenCreated
      abis:
        - name: LotryLaunch
          file: ./abis/LotryLaunch.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenCreated(indexed address,indexed address,indexed uint256,uint256,string,string)
          handler: handleTokenCreated
      file: ./src/lotry-launch.ts
