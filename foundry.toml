[profile.default]
# Directory where your Solidity contracts live (unchanged from Hardhat)
src = "contracts"
# Directory for forge-generated build artifacts
out = "out"
# Where external dependencies will be installed
libs = ["lib"]
# Solidity compiler version ‑ keep in sync with hardhat.config.js
solc_version = "0.8.20"
# Enable the optimizer – same defaults Hardhat uses
optimizer = true
optimizer_runs = 200

# Optional: specify where forge should look for Solidity tests.
# We leave this the same so your existing JavaScript tests are untouched.
# You can later add Solidity tests alongside them if you wish.

[test]
runner = "forge"

[rpc_endpoints]
# Pull BASE_SEPOLIA_RPC_URL from your .env at runtime
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[fmt]
line_length = 120
