type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  previousOwner: Bytes! # address
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type TokenCreated @entity(immutable: true) {
  id: Bytes!
  tokenAddress: Bytes! # address
  name: String! # string
  symbol: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
type Approval @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  spender: Bytes! # address
  value: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BuyEvent @entity(immutable: true) {
  id: Bytes!
  tokenAddress: Bytes! # address
  timestamp: BigInt! # uint256
  ethPrice: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type CurveParametersUpdated @entity(immutable: true) {
  id: Bytes!
  virtualTokenRes: BigInt! # uint256
  virtualEthRes: BigInt! # uint256
  k: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LotteryPoolUpdated @entity(immutable: true) {
  id: Bytes!
  newLotteryPool: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LotteryTaxStatusChanged @entity(immutable: true) {
  id: Bytes!
  isActive: Boolean! # bool
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SellEvent @entity(immutable: true) {
  id: Bytes!
  tokenAddress: Bytes! # address
  timestamp: BigInt! # uint256
  ethPrice: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type TokensPurchased @entity(immutable: true) {
  id: Bytes!
  buyer: Bytes! # address
  grossEthAmount: BigInt! # uint256
  netEthForCurve: BigInt! # uint256
  tokensReceived: BigInt! # uint256
  lotteryFeeApplied: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type TokensSold @entity(immutable: true) {
  id: Bytes!
  seller: Bytes! # address
  amountTokens: BigInt! # uint256
  amountEth: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Transfer @entity(immutable: true) {
  id: Bytes!
  from: Bytes! # address
  to: Bytes! # address
  value: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
