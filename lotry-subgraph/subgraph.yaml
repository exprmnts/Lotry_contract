specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TokenLaunchpad_json
    network: base-sepolia
    source:
      address: "0x57b085301Ff9CF8cDe978759885BfB2fF935268a"
      abi: TokenLaunchpad_json
      startBlock: 26993086
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenCreated
      abis:
        - name: TokenLaunchpad_json
          file: ./abis/TokenLaunchpad_json.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenCreated(indexed address,string,string)
          handler: handleTokenCreated
      file: ./src/token-launchpad-json.ts
